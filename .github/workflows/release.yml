name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re-)release (e.g. v0.0.1)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked --version 0.2.5

      - name: Build (cargo)
        if: '!matrix.cross'
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          BIN=docket
          STAGE=$(mktemp -d)
          ARCHIVE="${BIN}-${TAG}-${{ matrix.target }}.tar.gz"

          cp "target/${{ matrix.target }}/release/${BIN}" "$STAGE/${BIN}"
          chmod +x "$STAGE/${BIN}"

          mkdir -p dist
          tar -C "$STAGE" -czf "dist/${ARCHIVE}" "${BIN}"

          if command -v shasum >/dev/null 2>&1; then
            (cd dist && shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256")
          else
            (cd dist && sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256")
          fi

          ls -la dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docket-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Extract release notes from docs/CHANGELOG.md
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          if [ -f docs/CHANGELOG.md ]; then
            awk -v ver="$VERSION" '
              $0 ~ "^## \\["ver"\\]" { in_section=1; next }
              in_section && /^## \[/ { exit }
              in_section { print }
            ' docs/CHANGELOG.md > release-notes.md
          fi
          if [ ! -s release-notes.md ]; then
            echo "Release ${TAG}." > release-notes.md
          fi
          echo "--- release notes ---"
          cat release-notes.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
            gh release edit   "$TAG" --notes-file release-notes.md
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file release-notes.md \
              dist/*
          fi
